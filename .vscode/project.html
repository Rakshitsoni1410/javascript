<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="header">practice</h1>
    <button id="stop" type="button">stop</button>
    <script>
        const satrakshit = function () {
            console.log("rakshit ");
        }
        
        const changeText = function(){
            document.querySelector('#header').innerHTML = "best student";
        }
        
        setTimeout(changeText, 2000);
        
        // Call the satrakshit function when the button is clicked
        document.querySelector('#stop').addEventListener('click', satrakshit);
    </script>
</body>
</html>
